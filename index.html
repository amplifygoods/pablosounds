    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    #instants_container{margin:30px auto;text-align:center;max-width:970px}
    .instants{margin:30px 0;display:flex;flex-wrap:wrap;gap:30px 10px;justify-content:center}

<script>
  const audios = {};

  document.querySelectorAll('.instant').forEach((instant, i) => {
    const src = instant.dataset.src;
    const audio = new Audio(src);
    audio.preload = 'auto';
    audios[i] = audio;

    audio.addEventListener('ended', () => instant.classList.remove('playing'));

    function toggle() {
      if (!audio.paused) {
        audio.pause(); audio.currentTime = 0;
        instant.classList.remove('playing');
      } else {
        audio.currentTime = 0;
        audio.play().catch(()=>{});
        instant.classList.add('playing');
      }
    }

    instant.querySelector('.small-button').addEventListener('click', toggle);
    instant.querySelector('.instant-link').addEventListener('click', toggle);
  });

  function stopAll() {
    Object.values(audios).forEach(a => { a.pause(); a.currentTime = 0; });
    document.querySelectorAll('.instant').forEach(el => el.classList.remove('playing'));
  }
</script>
